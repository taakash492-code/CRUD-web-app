<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced CRUD App</title>

<style>

/* ===== ROOT COLORS ===== */
:root {
    --primary: linear-gradient(45deg, #ffcc00, #ff5733);
    --danger: #ff0000;
    --glass: rgba(255, 255, 255, 0.12);
}

/* ===== BODY ===== */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffcc00, #ff5733);
    margin: 0;
    padding: 20px;
    color: white;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1200px;
    margin: auto;
    backdrop-filter: blur(18px);
    background: var(--glass);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.2);
}

/* ===== TITLE ===== */
h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* ===== FORM ===== */
.form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 25px;
}

.input-group {
    position: relative;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.25);
    color: white;
}

.input-group label {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 14px;
    transition: 0.3s;
    pointer-events: none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    left: 8px;
    font-size: 11px;
    background: #ff5733;
    padding: 2px 6px;
    border-radius: 5px;
}

/* ===== BUTTONS ===== */
.form-buttons {
    grid-column: span 2;
    text-align: right;
}

button {
    border: none;
    padding: 10px 18px;
    border-radius: 30px;
    cursor: pointer;
    margin-left: 8px;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(255, 87, 51, 0.6);
}

.save-btn {
    background: linear-gradient(45deg, #ffcc00, #ff5733);
    color: white;
}

.cancel-btn {
    background: linear-gradient(45deg, #ff416c, #ff0000);
    color: white;
}

button:hover {
    transform: translateY(-2px) scale(1.05);
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px;
}

thead {
    background: linear-gradient(45deg, #ffcc00, #ff5733);
}

th, td {
    padding: 12px;
    text-align: center;
}

tbody tr {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    transition: 0.3s;
}

tbody tr:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.01);
}

/* ===== ACTION BUTTONS ===== */
.action-btn {
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: white;
}

.view {
    background: linear-gradient(45deg, #ffcc00, #ff5733);
}

.edit {
    background: linear-gradient(45deg, #ffb347, #ff416c);
}

.delete {
    background: linear-gradient(45deg, #ff0000, #990000);
}

/* ===== MODAL ===== */
.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: linear-gradient(135deg, #ff5733, #c70039);
    padding: 20px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

.close-btn {
    margin-top: 10px;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
}

</style>
</head>

<body>

<div class="container">
    <h2>Aakash</h2>
    <h2>24CA2004</h2>

    <!-- FORM -->
    <div class="form">

        <div class="input-group">
            <input type="text" id="name" placeholder=" ">
            <label>Name</label>
        </div>

        <div class="input-group">
            <input type="text" id="userId" placeholder=" ">
            <label>ID</label>
        </div>

        <div class="input-group">
            <input type="text" id="address" placeholder=" ">
            <label>Address</label>
        </div>

        <div class="input-group">
            <input type="text" id="designation" placeholder=" ">
            <label>Designation</label>
        </div>

        <div class="form-buttons">
            <button class="save-btn" onclick="saveData()">✔ Save</button>
            <button class="cancel-btn" onclick="resetForm()">✖ Cancel</button>
        </div>

    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Address</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>

let data = [];
let editIndex = -1;

// FETCH API
async function fetchData() {
    const res = await fetch('https://jsonplaceholder.typicode.com/users');
    const users = await res.json();

    data = users.map(u => ({
        name: u.name,
        id: u.id,
        address: u.address.city,
        designation: "Employee"
    }));

    renderTable();
}

// RENDER TABLE
function renderTable() {
    const table = document.getElementById('tableBody');
    table.innerHTML = "";

    data.forEach((item, index) => {
        table.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.id}</td>
            <td>${item.address}</td>
            <td>
                <button class="action-btn view" onclick="viewData(${index})">View</button>
                <button class="action-btn edit" onclick="editData(${index})">Edit</button>
                <button class="action-btn delete" onclick="deleteData(${index})">Delete</button>
            </td>
        </tr>`;
    });
}

// SAVE / UPDATE
function saveData() {
    const name = document.getElementById('name').value;
    const id = document.getElementById('userId').value;
    const address = document.getElementById('address').value;
    const designation = document.getElementById('designation').value;

    if (!name || !id || !address || !designation) {
        alert("All fields required!");
        return;
    }

    if (editIndex === -1) {
        data.push({ name, id, address, designation });
    } else {
        data[editIndex] = { name, id, address, designation };
        editIndex = -1;
    }

    renderTable();
    resetForm();
}

// EDIT
function editData(index) {
    const item = data[index];

    document.getElementById('name').value = item.name;
    document.getElementById('userId').value = item.id;
    document.getElementById('address').value = item.address;
    document.getElementById('designation').value = item.designation;

    editIndex = index;
}

// DELETE
function deleteData(index) {
    if (confirm("Delete this record?")) {
        data.splice(index, 1);
        renderTable();
    }
}

// VIEW (MODAL)
function viewData(index) {
    const item = data[index];

    const modal = document.getElementById('modal');
    const content = document.getElementById('modalContent');

    content.innerHTML = `
        <h3>User Details</h3>
        <p><b>Name:</b> ${item.name}</p>
        <p><b>ID:</b> ${item.id}</p>
        <p><b>Address:</b> ${item.address}</p>
        <p><b>Designation:</b> ${item.designation}</p>
        <button class="close-btn" onclick="closeModal()">Close</button>
    `;

    modal.style.display = "flex";
}

function closeModal() {
    document.getElementById('modal').style.display = "none";
}

// RESET
function resetForm() {
    document.querySelectorAll('.form input').forEach(i => i.value = "");
    editIndex = -1;
}

// INIT
fetchData();

</script>

</body>
</html>
